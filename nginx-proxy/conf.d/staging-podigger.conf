# Staging - Frontend (staging-podigger.perna.app)
server {
    listen 80;
    listen 443 ssl http2;
    server_name staging-podigger.perna.app;

    # Cloudflare Origin Certificates
    ssl_certificate /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    location / {
        set $upstream podigger-staging-frontend:3000;
        proxy_pass http://$upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
