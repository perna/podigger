# Staging - Backend (staging-api-podigger.perna.app)
server {
    listen 80;
    listen 443 ssl http2;
    server_name staging-api-podigger.perna.app;

    ssl_certificate /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }


    location /static/ {
        alias /var/www/podigger-staging/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /var/www/podigger-staging/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        set $upstream podigger-staging-backend:8000;
        proxy_pass http://$upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}

