# Produção - Backend (api.podigger.perna.app)
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.podigger.perna.app;

    ssl_certificate /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }


    location /static/ {
        alias /var/www/podigger-production/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /var/www/podigger-production/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        set $upstream podigger-production-backend:8000;
        proxy_pass http://$upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout ajustado para requests longos (ex: parsing de feeds)
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }
}

