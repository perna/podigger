# Gateway Nginx Global - Podigger
# Este proxy reverso lida com o tráfego de Staging e Produção usando Cloudflare Origin Certificates.
# A Cloudflare cuida do HTTPS externo para o usuário final,
# e o Nginx cuida de rotear internamente na porta 443 (Modo Strict da Cloudflare)
# ou porta 80.

services:
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: podigger-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - podigger-staging-static:/var/www/podigger-staging/static:ro
      - podigger-staging-media:/var/www/podigger-staging/media:ro
      - podigger-production-static:/var/www/podigger-production/static:ro
      - podigger-production-media:/var/www/podigger-production/media:ro
    networks:
      - podigger-proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  podigger-proxy:
    external: true

volumes:
  podigger-staging-static:
    external: true
  podigger-staging-media:
    external: true
  podigger-production-static:
    external: true
  podigger-production-media:
    external: true
