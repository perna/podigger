name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'migrations/**'
              - 'docker-compose**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  test-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: podigger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d podigger" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache UV
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install UV and dependencies
        run: |
          pip install uv
          uv pip install --system -r backend/requirements-dev.txt

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          cd backend
          # Validate commits in PR
          cz check --rev-range origin/${{ github.base_ref }}..HEAD || {
            echo "::warning::❌ Commit messages do not follow Conventional Commits format"
            echo "Please use the format: type(scope): subject"
            echo "Types: feat, fix, docs, style, refactor, test, chore"
            echo "Example: feat(backend): add user authentication"
            exit 1
          }

      - name: Run ruff (lint)
        run: |
          cd backend
          uv run ruff check .

      - name: Run ruff format check
        run: |
          cd backend
          uv run ruff format --check .

      - name: Wait for services
        run: |
          # Wait for Postgres
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d podigger && break || sleep 1
          done
          # Wait for Redis
          for i in {1..30}; do
            redis-cli -h localhost -p 6379 ping && break || sleep 1
          done


      - name: Run migrations
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: podigger
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DJANGO_SETTINGS_MODULE: config.settings
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run tests
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: podigger
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DJANGO_SETTINGS_MODULE: config.settings
          # Reduce Hypothesis examples in CI to keep test time reasonable.
          # Full exploration (max_examples=100) is for local runs.
          HYPOTHESIS_MAX_EXAMPLES: 20
        run: |
          cd backend
          pytest -v --tb=short --strict-markers

  test-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run lint
        run: |
          cd frontend
          npm run lint

      - name: Run build
        run: |
          cd frontend
          npm run build

  build-and-push-images:
    needs: [test-backend, test-frontend]
    # Only build images on push to main or develop (not on PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Enable advanced BuildKit features
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            # Tag with commit SHA (sha-abc123)
            type=sha,prefix=sha-,format=short
            # Tag with branch name (main, develop)
            type=ref,event=branch
            # Tag with 'latest' for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable layer caching for faster builds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Build for linux/amd64 (VPS architecture)
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
