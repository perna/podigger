# Configuração do Ruff para projetos Python/Django
# https://docs.astral.sh/ruff/

# Comprimento máximo de linha
line-length = 88

# Versão do Python alvo
target-version = "py312"

# Diretórios a serem excluídos
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "migrations",
    "staticfiles",
    "media",
    "node_modules",
    "build",
    "dist",
    "*.egg-info",
]

[lint]
# Regras ativadas
select = [
    "E", "W",    # pycodestyle
    "F",         # pyflakes
    "I",         # isort
    "C90",       # mccabe
    "N",         # pep8-naming
    "D",         # pydocstyle
    "UP",        # pyupgrade
    "S",         # bandit security
    "B",         # bugbear
    "A",         # builtins
    "C4",        # comprehensions
    "DTZ",       # datetimez
    "T10",       # debugger
    "DJ",        # django
    "EM",        # errmsg
    "ISC",       # implicit-str-concat
    "ICN",       # import-conventions
    "PIE",       # pie
    "PT",        # pytest-style
    "Q",         # quotes
    "RET",       # return
    "SIM",       # simplify
    "ARG",       # unused-arguments
    "PTH",       # use-pathlib
    "ERA",       # eradicate
    "PL",        # pylint
    "RUF",       # ruff-specific
    "ASYNC",     # flake8-async
    "EXE",       # flake8-executable
    "FA",        # flake8-future-annotations
    "FLY",       # flynt
    "FURB",      # refurb
    "G",         # flake8-logging-format
    "LOG",       # flake8-logging
    "PGH",       # pygrep-hooks
    "PERF",      # perflint
    "SLOT",      # flake8-slots
    "T20",       # flake8-print
    "TID",       # flake8-tidy-imports
    "TRY",       # tryceratops
    "TCH",       # flake8-type-checking
]

# Regras ignoradas
ignore = [
    "D100",      # Missing docstring in public module
    "D104",      # Missing docstring in public package
    "D101",      # Missing docstring in public class (optional, but common in rapid dev)
    "D102",      # Missing docstring in public method
    "D103",      # Missing docstring in public function
    "D105",      # Missing docstring in magic method
    "D106",      # Missing docstring in public nested class
    "D107",      # Missing docstring in __init__
    "DJ001",     # Avoid using null=True on string-based fields
    "TRY003",    # Avoid specifying long messages outside the exception class
    "ISC001",    # Avoid conflicts with the formatter
]

# Correções automáticas
fixable = ["ALL"]
unfixable = []

# Permitir imports não utilizados em __init__.py
[lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "E501", "S106", "PLR2004", "D", "ARG", "F811"]
"**/migrations/*.py" = ["E501", "D", "RUF012"]
"**/management/commands/*.py" = ["S311", "PLR2004", "E501", "D", "RUF012", "C901", "PLR0915", "ARG"]
"**/settings.py" = ["E501"]
"**/apps.py" = ["F401"]
"manage.py" = ["PLC0415", "EM101"]

[lint.isort]
# Configurações do isort
known-first-party = ["app"]  # Substitua por seu app principal
section-order = [
    "future",
    "standard-library",
    "django",
    "third-party",
    "first-party",
    "local-folder",
]

[lint.isort.sections]
"django" = ["django"]

[lint.flake8-quotes]
# Preferência por aspas duplas
inline-quotes = "double"
multiline-quotes = "double"

[lint.mccabe]
# Complexidade ciclomática máxima
max-complexity = 10

[lint.pylint]
# Máximo de argumentos em funções
max-args = 8
# Máximo de branches
max-branches = 15
# Máximo de statements
max-statements = 50

[lint.pydocstyle]
convention = "google"

[format]
# Formatação automática
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 72