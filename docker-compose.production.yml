# Docker Compose for Production Environment
# Deploy on VPS for production
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#   docker-compose -f docker-compose.production.yml down

services:
  # Traefik Reverse Proxy — Ponto de entrada único, SSL automático via Let's Encrypt
  traefik-production:
    image: traefik:v3.3
    container_name: podigger-production-traefik
    restart: unless-stopped
    command:
      # API e dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true" # Dashboard na porta 8080 (sem auth — acesse via SSH tunnel)
      # Docker provider: detecta containers na mesma rede via labels
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=podigger-production"
      # Entrypoints HTTP e HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect global HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via HTTP challenge
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Logging
      - "--log.level=WARNING"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard Traefik — acesse via: ssh -L 8080:localhost:8080 user@vps
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_production:/letsencrypt
    networks:
      - podigger-production
    labels:
      - "traefik.enable=true"
      # Dashboard do Traefik (acesse via SSH tunnel)
      - "traefik.http.routers.traefik-production-dashboard.rule=Host(`traefik.podigger.perna.app`)"
      - "traefik.http.routers.traefik-production-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-production-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-production-dashboard.service=api@internal"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Django + DRF
  backend-production:
    extends:
      file: docker-compose.base.yml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=production
    container_name: podigger-production-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
    expose:
      - "8000"
    volumes:
      - static_production:/app/staticfiles
      - media_production:/app/media
    depends_on:
      db-production:
        condition: service_healthy
      redis-production:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      - DATABASE_HOST=db-production
      - REDIS_URL=redis://redis-production:6379/1
      - CELERY_BROKER_URL=redis://redis-production:6379/0
    networks:
      - podigger-production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-production.rule=Host(`api.podigger.perna.app`)"
      - "traefik.http.routers.backend-production.entrypoints=websecure"
      - "traefik.http.routers.backend-production.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend-production.loadbalancer.server.port=8000"
      # Header X-Forwarded-Proto para o Django
      - "traefik.http.middlewares.backend-production-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.backend-production.middlewares=backend-production-headers"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Next.js
  frontend-production:
    extends:
      file: docker-compose.base.yml
      service: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - NEXT_PUBLIC_API_URL=https://api.podigger.perna.app
        - NEXT_PUBLIC_ENVIRONMENT=production
    container_name: podigger-production-frontend
    expose:
      - "3000"
    depends_on:
      backend-production:
        condition: service_healthy
    networks:
      - podigger-production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-production.rule=Host(`podigger.perna.app`)"
      - "traefik.http.routers.frontend-production.entrypoints=websecure"
      - "traefik.http.routers.frontend-production.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-production.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database
  db-production:
    extends:
      file: docker-compose.base.yml
      service: db
    container_name: podigger-production-db
    environment:
      POSTGRES_DB: podigger_production
      POSTGRES_USER: podigger_production
      POSTGRES_PASSWORD: ${DB_PASSWORD_PRODUCTION}
    volumes:
      - pgdata_production:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - podigger-production
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U podigger_production -d podigger_production" ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for cache and Celery broker
  redis-production:
    extends:
      file: docker-compose.base.yml
      service: redis
    container_name: podigger-production-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_production:/data
    networks:
      - podigger-production
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Celery Worker
  celery-production:
    extends:
      file: docker-compose.base.yml
      service: celery
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=production
    container_name: podigger-production-celery
    command: celery -A config worker --loglevel=warning --concurrency=4
    depends_on:
      db-production:
        condition: service_healthy
      redis-production:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      - DATABASE_HOST=db-production
      - REDIS_URL=redis://redis-production:6379/1
      - CELERY_BROKER_URL=redis://redis-production:6379/0
    networks:
      - podigger-production
    volumes:
      - media_production:/app/media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat
  celery-beat-production:
    extends:
      file: docker-compose.base.yml
      service: celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=production
    container_name: podigger-production-celery-beat
    command: celery -A config beat --loglevel=warning
    depends_on:
      db-production:
        condition: service_healthy
      redis-production:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      - DATABASE_HOST=db-production
      - REDIS_URL=redis://redis-production:6379/1
      - CELERY_BROKER_URL=redis://redis-production:6379/0
    networks:
      - podigger-production
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Database Backup (cron job)
  db-backup:
    extends:
      file: docker-compose.base.yml
      service: db-backup
    container_name: podigger-production-db-backup
    depends_on:
      - db-production
    environment:
      POSTGRES_DB: podigger_production
      POSTGRES_USER: podigger_production
      POSTGRES_PASSWORD: ${DB_PASSWORD_PRODUCTION}
      PGHOST: db-production
    volumes:
      - ./backups:/backups
    networks:
      - podigger-production
    entrypoint: |
      sh -c '
      echo "0 2 * * * pg_dump -U podigger_production podigger_production | gzip > /backups/backup-$$(date +\%Y\%m\%d-\%H\%M\%S).sql.gz && find /backups -name \"backup-*.sql.gz\" -mtime +7 -delete" | crontab - && crond -f -l 2
      '

volumes:
  pgdata_production:
    name: podigger-production-pgdata
  redis_production:
    name: podigger-production-redis
  static_production:
    name: podigger-production-static
  media_production:
    name: podigger-production-media
  letsencrypt_production:
    name: podigger-production-letsencrypt

networks:
  podigger-production:
    name: podigger-production
    driver: bridge
