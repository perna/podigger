[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"'). Used for performance regression tests that may be flaky on developer laptops but are expected to pass on CI runners.
addopts = 
    --strict-markers
    --tb=short
    -v
testpaths = podcasts/tests accounts/tests
