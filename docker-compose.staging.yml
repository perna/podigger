# Docker Compose for Staging Environment
# Deploy on VPS for testing before production
#
# Usage:
#   docker-compose -f docker-compose.staging.yml up -d
#   docker-compose -f docker-compose.staging.yml down

services:
  # Traefik Reverse Proxy — Ponto de entrada único, SSL automático via Let's Encrypt
  traefik-staging:
    image: traefik:v3.3
    container_name: podigger-staging-traefik
    restart: unless-stopped
    command:
      # API e dashboard (acessível internamente via SSH tunnel)
      - "--api.dashboard=true"
      - "--api.insecure=true" # Dashboard na porta 8080 (sem auth — acesse via SSH tunnel)
      # Docker provider: detecta containers na mesma rede via labels
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=podigger-staging"
      # Entrypoints HTTP e HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect global HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via HTTP challenge
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard Traefik — acesse via: ssh -L 8080:localhost:8080 user@vps
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_staging:/letsencrypt
    networks:
      - podigger-staging
    labels:
      - "traefik.enable=true"
      # Dashboard do Traefik (opcional — acesse via SSH tunnel)
      - "traefik.http.routers.traefik-staging-dashboard.rule=Host(`traefik.staging.podigger.perna.app`)"
      - "traefik.http.routers.traefik-staging-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-staging-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-staging-dashboard.service=api@internal"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Backend Django + DRF
  backend-staging:
    extends:
      file: docker-compose.base.yml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=staging
    container_name: podigger-staging-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
    expose:
      - "8000"
    volumes:
      - static_staging:/app/staticfiles
      - media_staging:/app/media
    depends_on:
      db-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    env_file:
      - ./backend/.env.staging
    environment:
      - DATABASE_HOST=db-staging
      - REDIS_URL=redis://redis-staging:6379/1
      - CELERY_BROKER_URL=redis://redis-staging:6379/0
    networks:
      - podigger-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-staging.rule=Host(`staging.api.podigger.perna.app`)"
      - "traefik.http.routers.backend-staging.entrypoints=websecure"
      - "traefik.http.routers.backend-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend-staging.loadbalancer.server.port=8000"
      # Timeouts para o Django (uploads, queries lentas)
      - "traefik.http.middlewares.backend-staging-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.backend-staging.middlewares=backend-staging-headers"

  # Frontend Next.js
  frontend-staging:
    extends:
      file: docker-compose.base.yml
      service: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - NEXT_PUBLIC_API_URL=https://staging.api.podigger.perna.app
        - NEXT_PUBLIC_ENVIRONMENT=staging
    container_name: podigger-staging-frontend
    expose:
      - "3000"
    depends_on:
      backend-staging:
        condition: service_healthy
    networks:
      - podigger-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-staging.rule=Host(`staging.podigger.perna.app`)"
      - "traefik.http.routers.frontend-staging.entrypoints=websecure"
      - "traefik.http.routers.frontend-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-staging.loadbalancer.server.port=3000"

  # PostgreSQL Database
  db-staging:
    extends:
      file: docker-compose.base.yml
      service: db
    container_name: podigger-staging-db
    environment:
      POSTGRES_DB: podigger_staging
      POSTGRES_USER: podigger_staging
      POSTGRES_PASSWORD: ${DB_PASSWORD_STAGING}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - podigger-staging
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U podigger_staging -d podigger_staging" ]

  # Redis for cache and Celery broker
  redis-staging:
    extends:
      file: docker-compose.base.yml
      service: redis
    container_name: podigger-staging-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_staging:/data
    networks:
      - podigger-staging

  # Celery Worker
  celery-staging:
    extends:
      file: docker-compose.base.yml
      service: celery
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=staging
    container_name: podigger-staging-celery
    command: celery -A config worker --loglevel=info --concurrency=2
    depends_on:
      db-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    env_file:
      - ./backend/.env.staging
    environment:
      - DATABASE_HOST=db-staging
      - REDIS_URL=redis://redis-staging:6379/1
      - CELERY_BROKER_URL=redis://redis-staging:6379/0
    networks:
      - podigger-staging
    volumes:
      - media_staging:/app/media

  # Celery Beat
  celery-beat-staging:
    extends:
      file: docker-compose.base.yml
      service: celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile.production
      args:
        - ENVIRONMENT=staging
    container_name: podigger-staging-celery-beat
    command: celery -A config beat --loglevel=info
    depends_on:
      db-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    env_file:
      - ./backend/.env.staging
    environment:
      - DATABASE_HOST=db-staging
      - REDIS_URL=redis://redis-staging:6379/1
      - CELERY_BROKER_URL=redis://redis-staging:6379/0
    networks:
      - podigger-staging

volumes:
  pgdata_staging:
    name: podigger-staging-pgdata
  redis_staging:
    name: podigger-staging-redis
  static_staging:
    name: podigger-staging-static
  media_staging:
    name: podigger-staging-media
  letsencrypt_staging:
    name: podigger-staging-letsencrypt

networks:
  podigger-staging:
    name: podigger-staging
    driver: bridge
